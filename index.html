<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes AI · 未来智能</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #06060f; --bg-secondary: #0c0c1a; --bg-card: #111128;
            --bg-input: #0a0a18; --border-glow: rgba(120,100,240,0.25);
            --accent-1: #6c5ce7; --accent-2: #48dbfb; --accent-3: #00d2d3;
            --text-primary: #e8e8ff; --text-secondary: #8888bb; --text-dim: #555577;
            --shadow-glow: 0 0 40px rgba(108,92,231,0.08);
            --code-bg: rgba(8,8,22,0.6);
            --code-border: rgba(108,92,231,0.18);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .glow-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .glow-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }
        .glow-orbs .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #6c5ce7;
            top: -100px;
            right: -100px;
        }
        .glow-orbs .orb:nth-child(2) {
            width: 300px;
            height: 300px;
            background: #48dbfb;
            bottom: -50px;
            left: -50px;
            opacity: 0.08;
        }
        .glow-orbs .orb:nth-child(3) {
            width: 200px;
            height: 200px;
            background: #00d2d3;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            opacity: 0.05;
        }
        .app {
            position: relative;
            z-index: 1;
            max-width: 880px;
            width: 100%;
            height: 94vh;
            max-height: 880px;
            background: var(--bg-secondary);
            border-radius: 32px;
            border: 1px solid rgba(108,92,231,0.15);
            box-shadow: var(--shadow-glow), inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(108,92,231,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: rgba(6,6,15,0.6);
            backdrop-filter: blur(20px);
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg,#a78bfa,#48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .logo .badge {
            font-size: 10px;
            font-weight: 500;
            -webkit-text-fill-color: #48dbfb;
            background: rgba(72,219,251,0.12);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(72,219,251,0.15);
            margin-left: 8px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #48dbfb;
            animation: pulse-dot 2s ease-in-out infinite;
            margin-right: 4px;
        }
        @keyframes pulse-dot {
            0%,100% { opacity:1; box-shadow:0 0 8px rgba(72,219,251,0.3); }
            50% { opacity:0.4; box-shadow:0 0 2px rgba(72,219,251,0.1); }
        }
        .header-actions button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .header-actions button:hover {
            background: rgba(108,92,231,0.1);
            color: var(--text-primary);
        }
        .mode-bar {
            padding: 10px 20px;
            display: flex;
            gap: 4px;
            border-bottom: 1px solid rgba(108,92,231,0.06);
            flex-shrink: 0;
            background: rgba(6,6,15,0.4);
            flex-wrap: wrap;
            align-items: center;
        }
        .mode-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .mode-btn:hover { color: var(--text-primary); background: rgba(108,92,231,0.06); }
        .mode-btn.active {
            background: rgba(108,92,231,0.15);
            color: #a78bfa;
            box-shadow: inset 0 0 20px rgba(108,92,231,0.05);
        }
        .mode-btn .dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .mode-btn .dot.text { background: #a78bfa; }
        .mode-btn .dot.image { background: #48dbfb; }
        .mode-btn .dot.video { background: #f59e6a; }
        .mode-btn .dot.search { background: #6ae09a; }
        .mode-divider {
            width: 1px;
            height: 24px;
            background: rgba(108,92,231,0.1);
            margin: 0 4px;
        }
        .mode-btn#deepThinkBtn {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .mode-btn#deepThinkBtn.active {
            color: #a78bfa;
            background: rgba(108,92,231,0.08);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 12px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: rgba(108,92,231,0.3); border-radius: 10px; }
        .message {
            display: flex;
            gap: 12px;
            max-width: 92%;
            animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }
        .message .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .message.user .avatar {
            background: linear-gradient(135deg,#6c5ce7,#4a3f8a);
            border-color: rgba(108,92,231,0.2);
        }
        .message.bot .avatar {
            background: rgba(108,92,231,0.1);
            border-color: rgba(108,92,231,0.1);
        }
        .message .bubble {
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 14.5px;
            line-height: 1.7;
            word-break: break-word;
            position: relative;
        }
        .message.user .bubble {
            background: linear-gradient(135deg,#6c5ce7,#4a3f8a);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(108,92,231,0.15);
        }
        .message.bot .bubble {
            background: rgba(17,17,40,0.8);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(108,92,231,0.06);
            backdrop-filter: blur(10px);
        }
        .message .bubble img, .message .bubble video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .message .bubble video { max-height: 340px; }
        .message .bubble .media-label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            letter-spacing: 0.3px;
        }
        .message .bubble .status-tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .status-tag.queued {
            background: rgba(255,200,100,0.1);
            color: #d0c080;
            border: 1px solid rgba(255,200,100,0.1);
        }
        .status-tag.generating {
            background: rgba(72,219,251,0.08);
            color: #48dbfb;
            border: 1px solid rgba(72,219,251,0.1);
            animation: pulse-tag 1.2s ease-in-out infinite;
        }
        @keyframes pulse-tag {
            0%,100% { opacity:1; }
            50% { opacity:0.4; }
        }
        .status-tag.done {
            background: rgba(72,219,251,0.06);
            color: #6ae09a;
            border: 1px solid rgba(72,219,251,0.08);
        }
        .status-tag.fail {
            background: rgba(255,80,80,0.08);
            color: #ff6a6a;
            border: 1px solid rgba(255,80,80,0.1);
        }
        .message .bubble .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 4px;
        }
        .message .bubble .file-info {
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(108,92,231,0.05);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(108,92,231,0.06);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .message.system .bubble {
            background: rgba(108,92,231,0.03);
            color: var(--text-secondary);
            font-size: 12px;
            text-align: center;
            border: 1px dashed rgba(108,92,231,0.06);
            border-radius: 20px;
            padding: 6px 16px;
            max-width: 100%;
        }
        .message.system { max-width: 100%; align-self: center; }
        .message.system .avatar { display: none; }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(16px) scale(0.96); }
            to { opacity:1; transform:translateY(0) scale(1); }
        }
        /* 代码块样式 */
        .code-wrap {
            margin:10px 0;
            border-radius:12px;
            border:1px solid var(--code-border);
            background:var(--code-bg);
            overflow:hidden;
        }
        .code-top {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:8px 14px;
            border-bottom:1px solid var(--code-border);
        }
        .code-lang-name {
            font-family:Consolas,monospace;
            font-size:11px;
            color:var(--accent-2);
        }
        .code-btn-group {
            display:flex;
            gap:8px;
        }
        .code-btn {
            border:1px solid var(--code-border);
            background:transparent;
            color:var(--text-secondary);
            font-size:11px;
            padding:3px 10px;
            border-radius:6px;
            cursor:pointer;
            transition:0.2s;
        }
        .code-btn:hover {
            color:var(--accent-2);
            border-color:rgba(72,219,251,0.3);
        }
        .code-content-area {
            padding:14px;
            font-family:Consolas,monospace;
            font-size:13px;
            color:#e0ecff;
            white-space:pre-wrap;
            max-height:360px;
            overflow-y:auto;
        }
        .code-content-area::-webkit-scrollbar { width:3px; }
        /* 推理折叠面板 */
        .reasoning-wrap {
            margin: 8px 0 12px 0;
            border-left: 2px solid #a78bfa;
            background: rgba(108,92,231,0.04);
            border-radius: 8px;
            overflow: hidden;
        }
        .reasoning-summary {
            padding: 6px 12px;
            font-size: 12px;
            color: #a78bfa;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            background: rgba(108,92,231,0.03);
            transition: 0.2s;
        }
        .reasoning-summary:hover {
            background: rgba(108,92,231,0.07);
        }
        .reasoning-summary .arrow {
            display: inline-block;
            transition: transform 0.25s ease;
        }
        .reasoning-summary .arrow.open {
            transform: rotate(90deg);
        }
        .reasoning-detail {
            padding: 8px 14px;
            font-size: 13.5px;
            color: #c0c8e0;
            line-height: 1.6;
            border-top: 1px solid rgba(108,92,231,0.06);
            display: none;
        }
        .reasoning-detail.open {
            display: block;
        }
        .reasoning-detail .reasoning-content {
            white-space: pre-wrap;
            font-family: 'Inter', sans-serif;
        }
        .input-area {
            padding: 12px 20px 16px 20px;
            border-top: 1px solid rgba(108,92,231,0.06);
            flex-shrink: 0;
            background: rgba(6,6,15,0.6);
            backdrop-filter: blur(20px);
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--bg-input);
            border-radius: 16px;
            padding: 4px 4px 4px 16px;
            border: 1px solid rgba(108,92,231,0.08);
            transition: 0.25s;
        }
        .input-row:focus-within {
            border-color: rgba(108,92,231,0.25);
            box-shadow: 0 0 30px rgba(108,92,231,0.04);
        }
        .input-row textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: var(--text-primary);
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-height: 42px;
            max-height: 100px;
            line-height: 1.6;
        }
        .input-row textarea::placeholder {
            color: var(--text-dim);
            font-weight: 300;
        }
        .input-row .input-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-row .input-actions button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .input-row .input-actions button:hover {
            background: rgba(108,92,231,0.08);
            color: var(--text-primary);
        }
        .input-row .input-actions .file-input-wrap {
            position: relative;
            overflow: hidden;
        }
        .input-row .input-actions .file-input-wrap input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            font-size: 0;
        }
        .input-row .send-btn {
            background: linear-gradient(135deg,#6c5ce7,#4a3f8a);
            border: none;
            border-radius: 12px;
            padding: 10px 22px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            font-family: 'Inter', sans-serif;
        }
        .input-row .send-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(108,92,231,0.15);
        }
        .input-row .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .input-hint {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 8px;
            text-align: center;
            letter-spacing: 0.5px;
            font-weight: 300;
        }
        .input-hint .mode-indicator {
            color: var(--text-secondary);
            font-weight: 400;
        }
        .input-hint .key-hint {
            color: rgba(108,92,231,0.3);
            margin: 0 4px;
        }
        .file-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(108,92,231,0.04);
            padding: 4px 12px 4px 4px;
            border-radius: 10px;
            border: 1px solid rgba(108,92,231,0.06);
            margin: 4px 0 0 16px;
            max-width: 300px;
            animation: slideUp 0.2s ease;
        }
        .file-preview .file-icon { font-size: 20px; }
        .file-preview .file-name {
            font-size: 12px;
            color: var(--text-secondary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-preview .file-remove {
            background: transparent;
            border: none;
            color: #ff6a6a;
            cursor: pointer;
            padding: 2px 6px;
            font-size: 14px;
        }
        @media (max-width:600px) {
            .app { height: 100vh; max-height: none; border-radius: 0; }
            .header { padding:12px 16px; }
            .mode-bar { padding:8px 12px; gap:2px; }
            .mode-btn { font-size:11px; padding:4px 10px; }
            .messages { padding:12px 14px; }
            .input-area { padding:8px 12px 12px 12px; }
            .input-row { padding:2px 2px 2px 12px; }
            .input-row .send-btn { padding:8px 16px; font-size:13px; }
            .message { max-width:96%; }
            .message .avatar { width:30px;height:30px; }
        }
    </style>
</head>
<body>
    <div class="glow-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <div class="logo">✦ Agnes <span class="badge"><span class="status-dot"></span> 永久免费</span></div>
            </div>
            <div class="header-actions"><button id="clearBtn" title="清空对话">🗑️</button></div>
        </div>
        <div class="mode-bar">
            <button class="mode-btn active" data-mode="text"><span class="dot text"></span> 对话</button>
            <button class="mode-btn" data-mode="image"><span class="dot image"></span> 图片</button>
            <button class="mode-btn" data-mode="video"><span class="dot video"></span> 视频</button>
            <button class="mode-btn" data-mode="search"><span class="dot search"></span> 联网搜索</button>
            <div class="mode-divider"></div>
            <button class="mode-btn active" id="deepThinkBtn">🧠 深度思考 <span id="thinkBadge" style="font-size:10px;color:var(--text-dim);">开</span></button>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div style="font-weight:500;margin-bottom:4px;">✦ Agnes AI 已就绪</div>
                    支持文字对话、图片生成、视频生成和<strong>真正的联网搜索</strong>（维基百科）。<br>
                    <span style="font-size:12px;color:var(--text-secondary);">代码块自带复制、下载文件按钮。</span>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-row" id="inputRow">
                <textarea id="userInput" rows="1" placeholder="输入内容..."></textarea>
                <div class="input-actions">
                    <button id="searchToggleBtn" title="联网搜索" style="color:var(--text-dim);">🌐</button>
                    <div class="file-input-wrap">
                        <button id="fileBtn" title="上传文件">📎</button>
                        <input type="file" id="fileInput" multiple accept=".txt,.pdf,.doc,.docx,.md,.json,.csv,.py,.js,.html,.css,.png,.jpg,.jpeg">
                    </div>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>
            </div>
            <div id="filePreviewContainer" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;"></div>
            <div class="input-hint">
                当前模式：<span class="mode-indicator" id="modeIndicator">💬 对话</span>
                ｜ Enter 发送 · Shift+Enter 换行
                <span class="key-hint">｜</span> <span id="searchStatus" style="color:var(--text-dim);">🌐 搜索: 关</span>
            </div>
        </div>
    </div>
    <script>
        // ============================================
        // 配置
        // ============================================
        const API_KEY = 'sk-YEbD1fypPLY9DJ4yY3q9yCgQY3n9LI2CaYhclVYAEzdShDLv';
        const API_BASE = 'https://apihub.agnes-ai.com/v1';
        const TEXT_MODEL = 'agnes-2.0-flash';
        const IMAGE_MODEL = 'agnes-image-2.0-flash';
        const VIDEO_MODEL = 'agnes-video-v2.0';
        // ============================================
        // DOM
        // ============================================
        const messagesEl = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const deepThinkBtn = document.getElementById('deepThinkBtn');
        const thinkBadge = document.getElementById('thinkBadge');
        const modeIndicator = document.getElementById('modeIndicator');
        const searchStatus = document.getElementById('searchStatus');
        const searchToggleBtn = document.getElementById('searchToggleBtn');
        const fileInput = document.getElementById('fileInput');
        const filePreviewContainer = document.getElementById('filePreviewContainer');
        let mode = 'text';
        let deepThink = true;
        let searchEnabled = false;
        let isProcessing = false;
        let uploadedFiles = [];
        // 语言后缀映射
        const langExt = {js:'js',html:'html',css:'css',py:'py',json:'json',md:'md',sh:'sh'};
        // ========== 全局委托：复制/下载 ==========
        messagesEl.addEventListener('click',e=>{
            const copyBtn = e.target.closest('.copy-btn');
            const dlBtn = e.target.closest('.download-btn');
            if(copyBtn){
                const wrap = copyBtn.closest('.code-wrap');
                const codeText = wrap.querySelector('.code-content-area').innerText;
                navigator.clipboard.writeText(codeText);
                const old = copyBtn.textContent;
                copyBtn.textContent = '已复制';
                setTimeout(()=>copyBtn.textContent=old,1200);
            }
            if(dlBtn){
                const wrap = dlBtn.closest('.code-wrap');
                const codeText = wrap.querySelector('.code-content-area').innerText;
                const langName = wrap.querySelector('.code-lang-name').innerText;
                const ext = langExt[langName.toLowerCase()] || 'txt';
                const blob = new Blob([codeText],{type:'text/plain'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `code.${ext}`;
                a.click();
                URL.revokeObjectURL(a.href);
            }
        })
        // ========== 渲染文本（含代码块）==========
        function renderTextWithCode(rawText){
            const reg = /```(\w+)?\n([\s\S]*?)```/g;
            let html = '';
            let lastIdx = 0;
            let match;
            while((match = reg.exec(rawText)) !== null){
                const plain = rawText.slice(lastIdx).slice(0,match.index-lastIdx).replaceAll('\n','<br>');
                html += plain;
                const codeLang = match[1] || 'code';
                const codeStr = match[2];
                html += `
<div class="code-wrap">
    <div class="code-top">
        <span class="code-lang-name">${codeLang}</span>
        <div class="code-btn-group">
            <button class="code-btn copy-btn">复制全部</button>
            <button class="code-btn download-btn">下载文件</button>
        </div>
    </div>
    <div class="code-content-area">${codeStr}</div>
</div>`;
                lastIdx = match.index + match[0].length;
            }
            const rest = rawText.slice(lastIdx).replaceAll('\n','<br>');
            html += rest;
            return html;
        }
        // ========== 解析推理内容（深度思考模式）==========
        function parseReasoning(rawText) {
            const reasoningRegex = /===推理过程===\s*([\s\S]*?)\s*===最终答案===\s*([\s\S]*)/;
            const match = rawText.match(reasoningRegex);
            if (match) {
                return { reasoning: match[1].trim(), final: match[2].trim() };
            }
            return { reasoning: null, final: rawText };
        }
        // ========== 渲染带推理面板的消息 ==========
        function renderBubbleContent(content, extra = {}) {
            let parsed = parseReasoning(content);
            let html = '';
            if (parsed.reasoning && extra.showReasoning !== false) {
                html += `
<div class="reasoning-wrap">
    <div class="reasoning-summary" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.arrow').classList.toggle('open');">
        <span class="arrow open">▶</span> 显示推理过程
    </div>
    <div class="reasoning-detail open">
        <div class="reasoning-content">${parsed.reasoning.replaceAll('\n','<br>')}</div>
    </div>
</div>
<div class="final-answer">${renderTextWithCode(parsed.final)}</div>`;
            } else {
                html = renderTextWithCode(content);
            }
            return html;
        }
        // ============================================
        // 核心消息函数
        // ============================================
        function addMessage(role, content, extra = {}) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;
            if (!extra.isSystem) {
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = role === 'user' ? '👤' : '🤖';
                wrapper.appendChild(avatar);
            }
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (extra.isSystem) {
                wrapper.className = 'message system';
                bubble.style.textAlign = 'center';
                bubble.style.padding = '4px 14px';
                bubble.textContent = content;
                wrapper.appendChild(bubble);
                messagesEl.appendChild(wrapper);
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return wrapper;
            }
            if (extra.files && extra.files.length) {
                const info = document.createElement('div');
                info.className = 'file-info';
                info.textContent = `📎 已上传 ${extra.files.length} 个文件`;
                bubble.appendChild(info);
            }
            if (extra.image) {
                const img = document.createElement('img');
                img.src = extra.image;
                img.alt = '生成图片';
                img.onerror = () => { img.parentElement.innerHTML = '❌ 图片加载失败'; };
                bubble.appendChild(img);
                const label = document.createElement('span');
                label.className = 'media-label';
                label.textContent = '🖼️ 图片生成成功';
                bubble.appendChild(label);
            } else if (extra.video) {
                const video = document.createElement('video');
                video.src = extra.video;
                video.controls = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '340px';
                video.style.borderRadius = '10px';
                video.onerror = () => { video.parentElement.innerHTML = '❌ 视频加载失败'; };
                bubble.appendChild(video);
                const label = document.createElement('span');
                label.className = 'media-label';
                label.textContent = '🎬 视频生成成功';
                bubble.appendChild(label);
            } else if (extra.searchResults) {
                bubble.innerHTML = renderTextWithCode(content);
                const label = document.createElement('span');
                label.className = 'media-label';
                label.textContent = '🌐 联网搜索结果';
                bubble.appendChild(label);
            } else {
                bubble.innerHTML = renderBubbleContent(content, extra);
            }
            if (extra.status) {
                const tag = document.createElement('span');
                tag.className = `status-tag ${extra.status}`;
                tag.textContent = extra.statusText || extra.status;
                bubble.appendChild(tag);
            }
            if (extra.progressText) {
                const p = document.createElement('div');
                p.className = 'progress-text';
                p.textContent = extra.progressText;
                bubble.appendChild(p);
            }
            wrapper.appendChild(bubble);
            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return wrapper;
        }
        function addSystemMessage(text) {
            return addMessage('system', text, { isSystem: true });
        }
        function updateLastMessage(text, extra = {}) {
            const last = messagesEl.lastElementChild;
            if (!last) return;
            const bubble = last.querySelector('.bubble');
            bubble.innerHTML = '';
            if (extra.image) {
                const img = document.createElement('img');
                img.src = extra.image;
                img.alt = '生成图片';
                bubble.appendChild(img);
            } else if (extra.video) {
                const video = document.createElement('video');
                video.src = extra.video;
                video.controls = true;
                bubble.appendChild(video);
            } else {
                bubble.innerHTML = renderBubbleContent(text, extra);
            }
            if (extra.status) {
                const tag = document.createElement('span');
                tag.className = `status-tag ${extra.status}`;
                tag.textContent = extra.statusText || extra.status;
                bubble.appendChild(tag);
            }
            if (extra.progressText) {
                const p = document.createElement('div');
                p.className = 'progress-text';
                p.textContent = extra.progressText;
                bubble.appendChild(p);
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        function getFileContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = reject;
                if (file.type.startsWith('image/')) {
                    reader.readAsDataURL(file);
                } else {
                    reader.readAsText(file);
                }
            });
        }
        // ============================================
        // 联网搜索
        // ============================================
        async function realSearch(query) {
            try {
                const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('搜索请求失败');
                const data = await res.json();
                if (!data.query?.search?.length) return '未检索到相关词条';
                const title = data.query.search[0].title;
                const detailUrl = `https://en.wikipedia.org/w/api.php?prop=extracts&titles=${encodeURIComponent(title)}&format=json&origin=*`;
                const detailRes = await fetch(detailUrl);
                const detailData = await detailRes.json();
                const extract = Object.values(detailData.query.pages)[0].extract || '无摘要内容';
                return `【搜索关键词】${query}\n标题：${title}\n${extract}`;
            } catch (e) {
                return `搜索异常：${e.message}`;
            }
        }
        // ============================================
        // 文件上传
        // ============================================
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const f of files) {
                const cnt = await getFileContent(f);
                uploadedFiles.push({ name: f.name, content: cnt, type: f.type });
            }
            renderFilePreviews();
            addSystemMessage(`已上传 ${files.length} 个文件`);
        })
        function renderFilePreviews() {
            filePreviewContainer.innerHTML = '';
            uploadedFiles.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'file-preview';
                div.innerHTML = `<span class="file-icon">📄</span><span class="file-name">${item.name}</span><button class="file-remove" data-i="${idx}">✕</button>`;
                div.querySelector('button').onclick = () => {
                    uploadedFiles.splice(idx, 1);
                    renderFilePreviews();
                }
                filePreviewContainer.appendChild(div);
            })
        }
        // ============================================
        // 搜索开关
        // ============================================
        searchToggleBtn.onclick = () => {
            searchEnabled = !searchEnabled;
            searchStatus.textContent = searchEnabled ? '🌐 搜索: 开' : '🌐 搜索: 关';
            searchToggleBtn.style.color = searchEnabled ? '#a78bfa' : 'var(--text-dim)';
        }
        // ============================================
        // 发送主逻辑（优化流式渲染，推理输出提速）
        // ============================================
        async function handleSend() {
            const text = input.value.trim();
            if (!text && uploadedFiles.length === 0) return;
            if (isProcessing) return;
            isProcessing = true;
            sendBtn.disabled = true;
            input.value = '';
            addMessage('user', text, { files: uploadedFiles });
            let fileContext = uploadedFiles.map(f => `---文件${f.name}---\n${f.content}`).join('\n');
            try {
                // ----- 联网搜索模式 -----
                if (mode === 'search' || searchEnabled) {
                    const searchResult = await realSearch(text);
                    const resp = await fetch(`${API_BASE}/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: TEXT_MODEL,
                            messages: [
                                { role: 'system', content: `${deepThink ? '深度完整思考，请严格按格式输出：\n===推理过程===\n（你的推理）\n===最终答案===\n（最终回答）' : '简洁回答'}\n附件内容：${fileContext}\n维基搜索数据：${searchResult}` },
                                { role: 'user', content: text }
                            ],
                            temperature: deepThink ? 0.7 : 0.2
                        })
                    })
                    const resData = await resp.json();
                    let reply = resData.choices[0].message.content;
                    updateLastMessage(reply, { status: 'done', statusText: '完成' });
                    return;
                }
                // ----- 图片生成 -----
                if (mode === 'image') {
                    addMessage('bot', '正在渲染图片...', { status: 'generating', statusText: '生成中' });
                    const resp = await fetch(`${API_BASE}/images/generations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({ model: IMAGE_MODEL, prompt: text, size: '1024x1024' })
                    })
                    const resData = await resp.json();
                    updateLastMessage('', { image: resData.data[0].url, status: 'done', statusText: '完成' });
                    return;
                }
                // ----- 视频生成 -----
                if (mode === 'video') {
                    addMessage('bot', '视频任务已加入队列...', { status: 'queued', statusText: '排队' });
                    const createResp = await fetch(`${API_BASE}/videos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({ model: VIDEO_MODEL, prompt: text, width: 1152, height: 768, num_frames: 121 })
                    })
                    const createData = await createResp.json();
                    let videoId = createData.video_id;
                    let videoUrl = null;
                    // 优化：缩短轮询间隔，加快状态获取
                    while (true) {
                        await new Promise(r => setTimeout(r, 1800));
                        const queryResp = await fetch(`${API_BASE}/agnesapi?video_id=${videoId}`, { headers: { Authorization: `Bearer ${API_KEY}` } });
                        const queryData = await queryResp.json();
                        if (queryData.status === 'completed') {
                            videoUrl = queryData.video_url;
                            break;
                        }
                        if (queryData.status === 'failed') {
                            updateLastMessage(`视频生成失败：${queryData.error.message}`, { status: 'fail', statusText: '失败' });
                            return;
                        }
                    }
                    updateLastMessage('', { video: videoUrl, status: 'done', statusText: '完成' });
                    return;
                }
                // ----- 普通对话（优化流式渲染，推理输出提速）-----
                addMessage('bot', deepThink ? '🤔 深度思考中...' : '⏳ 回答中...', { status: 'generating', statusText: '生成中' });
                let systemContent = '';
                if (deepThink) {
                    systemContent = `你是一个AI助手，请严格遵循以下格式输出，不要遗漏任何部分：
        ===推理过程===
        （在此写出你的推理步骤，简洁清晰，分点列出）
        ===最终答案===
        （给出最终回答，可以包含代码块）
        附件内容：${fileContext}`;
                } else {
                    systemContent = `简洁回答，不用输出推理过程。附件：${fileContext}`;
                }
                const resp = await fetch(`${API_BASE}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: TEXT_MODEL,
                        messages: [
                            { role: 'system', content: systemContent },
                            { role: 'user', content: text }
                        ],
                        temperature: deepThink ? 0.7 : 0.2,
                        stream: true
                    })
                });
                if (!resp.ok) {
                    // 回退非流式
                    const fallbackResp = await fetch(`${API_BASE}/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: TEXT_MODEL,
                            messages: [
                                { role: 'system', content: systemContent },
                                { role: 'user', content: text }
                            ],
                            temperature: deepThink ? 0.7 : 0.2,
                            stream: false
                        })
                    });
                    const fallbackData = await fallbackResp.json();
                    const reply = fallbackData.choices[0].message.content;
                    updateLastMessage(reply, { status: 'done', statusText: '完成' });
                    return;
                }
                const reader = resp.body.getReader();
                const decoder = new TextDecoder('utf-8', { stream: true });
                let accumulated = '';
                let finished = false;
                let renderTick = false;
                // 优化流式循环，减少DOM重绘损耗
                while (!finished) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.slice(6);
                        if (payload === '[DONE]') {
                            finished = true;
                            break;
                        }
                        try {
                            const json = JSON.parse(payload);
                            const delta = json.choices[0]?.delta?.content;
                            if (delta) accumulated += delta;
                        } catch (e) {}
                    }
                    // 使用requestAnimationFrame节流渲染，避免高频DOM刷新卡顿
                    if (!renderTick) {
                        requestAnimationFrame(() => {
                            const lastMsg = messagesEl.lastElementChild;
                            if (!lastMsg) return;
                            const bubble = lastMsg.querySelector('.bubble');
                            bubble.innerHTML = renderBubbleContent(accumulated, { showReasoning: deepThink });
                            // 仅首次添加生成标签，不再重复创建DOM
                            if (!bubble.querySelector('.generating')) {
                                const tag = document.createElement('span');
                                tag.className = 'status-tag generating';
                                tag.textContent = '生成中';
                                bubble.appendChild(tag);
                            }
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                            renderTick = false;
                        });
                        renderTick = true;
                    }
                }
                updateLastMessage(accumulated, { status: 'done', statusText: '完成' });
            } catch (err) {
                addMessage('bot', `系统错误：${err.message}`, { status: 'fail', statusText: '故障' });
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }
        // ============================================
        // 事件绑定
        // ============================================
        sendBtn.onclick = handleSend;
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        })
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        })
        document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                mode = this.dataset.mode;
                const map = { text:'💬 对话', image:'🖼️ 图片', video:'🎬 视频', search:'🌐 联网搜索' };
                modeIndicator.textContent = map[mode];
                if (mode === 'search') {
                    searchEnabled = true;
                    searchToggleBtn.style.color = '#a78bfa';
                    searchStatus.textContent = '🌐 搜索: 开';
                }
            }
        })
        deepThinkBtn.onclick = function() {
            deepThink = !deepThink;
            thinkBadge.textContent = deepThink ? '开' : '关';
            this.classList.toggle('active');
            addSystemMessage(deepThink ? '已开启深度思考（显示推理过程）' : '切换简洁模式（不显示推理）');
        }
        clearBtn.onclick = function() {
            messagesEl.innerHTML = '';
            uploadedFiles = [];
            renderFilePreviews();
            addMessage('bot', '会话已清空，可以重新提问', {});
        }
        // 初始化
        input.focus();
    </script>
</body>
</html>
